name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          # Convert semver to integer version code: 1.2.3 -> 10203
          IFS='.' read -r major minor patch <<< "$TAG"
          CODE=$(( major * 10000 + minor * 100 + patch ))
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: gradle assembleRelease

      - name: Sign APK
        if: ${{ secrets.ANDROID_SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename APK
        run: |
          if [ -n "${{ steps.sign.outputs.signedReleaseFile }}" ]; then
            mv ${{ steps.sign.outputs.signedReleaseFile }} openscad-web-generator-${{ steps.version.outputs.name }}.apk
          else
            mv android/app/build/outputs/apk/release/*.apk openscad-web-generator-${{ steps.version.outputs.name }}.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openscad-web-generator-${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
